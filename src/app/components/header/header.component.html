<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    
    <ion-title>{{ title }}</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="presentPopover($event)">
        <ion-icon slot="icon-only" name="person-circle-outline" class="user-btn"></ion-icon>
      </ion-button>
    
      <ion-popover [isOpen]="isPopoverOpen" [event]="popoverEvent" (didDismiss)="isPopoverOpen = false">
  <ng-template>
    <ion-content class="ion-padding popover-dark">
      <h6 class="perfil-title">Perfil</h6>
      
      <ion-list lines="none" class="transparent-list">
        <div class="user-info-section">
          <ion-icon name="person-circle-outline" color="primary"></ion-icon>
          <div class="user-details">
            <small>Sesión iniciada como:</small>
            <p><strong>{{ userEmail }}</strong></p>
          </div>
        </div>

        <div class="menu-spacer"></div> <ion-item button (click)="togglePasswordMenu()" detail="false" class="menu-item-custom">
          <ion-icon name="lock-closed-outline" slot="start" color="primary"></ion-icon>
          <ion-label>Cambiar contraseña</ion-label>
          <ion-icon 
            [name]="isPasswordFieldsVisible ? 'chevron-up-outline' : 'chevron-down-outline'" 
            slot="end" color="medium">
          </ion-icon>
        </ion-item>

        <div *ngIf="isPasswordFieldsVisible" class="password-dropdown-content">
          <ion-item class="input-item">
            <ion-input label="Actual" labelPlacement="stacked" type="password" [(ngModel)]="passActual"></ion-input>
          </ion-item>
          <ion-item class="input-item">
            <ion-input label="Nueva" labelPlacement="stacked" type="password" [(ngModel)]="passNueva"></ion-input>
          </ion-item>
          <ion-item class="input-item">
            <ion-input label="Confirmar" labelPlacement="stacked" type="password" [(ngModel)]="passConfirmar"></ion-input>
          </ion-item>
          <ion-button expand="block" color="success" fill="solid" (click)="updatePassword()" class="btn-update">
            Actualizar Contraseña
          </ion-button>
        </div>

        <div class="menu-spacer"></div> <div class="delete-container">
          <ion-button expand="block" fill="outline" color="danger" (click)="borrarCuenta()" class="btn-delete-ghost">
            <ion-icon name="warning-outline" slot="start"></ion-icon>
            Eliminar cuenta
          </ion-button>
        </div>

      </ion-list>
    </ion-content>
  </ng-template>
</ion-popover>

<ion-modal [isOpen]="mostrarConfirmar" (didDismiss)="mostrarConfirmar = false" id="modal-confirm">
  <ng-template>
    <div style="padding: 20px; text-align: center; background: #1f2937; color: white;">
      <ion-icon name="warning-outline" color="warning" style="font-size: 48px;"></ion-icon>
      <h2 style="margin: 10px 0;">{{ tituloConfirmar }}</h2>
      <p style="color: #9ca3af;">{{ mensajeConfirmar }}</p>
      
      <div style="display: flex; justify-content: space-around; margin-top: 20px;">
        <ion-button fill="clear" (click)="mostrarConfirmar = false" style="--color: white;">CANCELAR</ion-button>
        <ion-button [color]="esBorrar ? 'danger' : 'success'" (click)="ejecutarAccion()">
          {{ esBorrar ? 'BORRAR' : 'SALIR' }}
        </ion-button>
      </div>
    </div>
  </ng-template>
</ion-modal>
