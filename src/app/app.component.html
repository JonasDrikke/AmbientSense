<ion-app>
  <ion-menu contentId="main-content" type="overlay" *ngIf="userService.isLoggedIn()">
    <ion-header>
      <ion-toolbar color="primary"> <ion-title>AmbientSense</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list id="inbox-list">
        <ion-list-header>Panel de Control</ion-list-header>
        <p style="margin-left: 16px; color: #6b7280; font-size: 12px;">Monitoreo en tiempo real</p>

        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/scan" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
            <ion-icon aria-hidden="true" slot="start" name="bluetooth-outline"></ion-icon>
            <ion-label>Escanear Sensores</ion-label>
          </ion-item>
          
          <ion-item routerLink="/real-time" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
            <ion-icon aria-hidden="true" slot="start" name="pulse-outline"></ion-icon>
            <ion-label>Tiempo Real</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-list-header style="margin-top: 20px;">Historial y Datos</ion-list-header>

        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/temp-history" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
            <ion-icon aria-hidden="true" slot="start" name="thermometer-outline"></ion-icon>
            <ion-label>Log Temperatura</ion-label>
          </ion-item>
          <ion-item routerLink="/temp-stats" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
            <ion-icon aria-hidden="true" slot="start" name="bar-chart-outline"></ion-icon>
            <ion-label>Stats Temp</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/hum-history" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
            <ion-icon aria-hidden="true" slot="start" name="water-outline"></ion-icon>
            <ion-label>Log Humedad</ion-label>
          </ion-item>
          <ion-item routerLink="/hum-stats" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
            <ion-icon aria-hidden="true" slot="start" name="stats-chart-outline"></ion-icon>
            <ion-label>Stats Humedad</ion-label>
          </ion-item>
        </ion-menu-toggle>

      </ion-list>

      <ion-list id="labels-list">
        <ion-item (click)="logout()" lines="none" style="cursor: pointer; --color: #ef4444;">
          <ion-icon slot="start" name="log-out-outline"></ion-icon>
          <ion-label>Cerrar Sesión</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-modal [isOpen]="mostrarConfirmar" (didDismiss)="mostrarConfirmar = false" id="modal-confirm">
    <ng-template>
      <div style="padding: 24px; text-align: center; background: #1f2937; color: white; border-radius: 16px;">
        <ion-icon name="warning-outline" style="font-size: 64px; color: #f59e0b;"></ion-icon>
        <h2 style="margin: 15px 0; font-weight: bold;">{{ tituloConfirmar }}</h2>
        <p style="color: #9ca3af; margin-bottom: 25px;">{{ mensajeConfirmar }}</p>
        
        <div style="display: flex; gap: 12px; justify-content: center;">
          <ion-button fill="clear" (click)="mostrarConfirmar = false" style="--color: white; flex: 1;">
            CANCELAR
          </ion-button>
          <ion-button color="success" (click)="ejecutarAccion()" style="flex: 1; font-weight: bold;">
            SALIR
          </ion-button>
        </div>
      </div>
    </ng-template>
  </ion-modal>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
<jeep-sqlite></jeep-sqlite>
