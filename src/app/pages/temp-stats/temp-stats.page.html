<app-header title="Estadísticas Temperatura"></app-header>

<ion-content class="ion-padding">
  <div class="stats-container" *ngIf="stats">
    <div class="main-circle">
      <small>Promedio</small>
      <h1>{{ stats.promedio | number:'1.1-1' }}°C</h1>
    </div>

    <ion-grid>
      <ion-row>
        <ion-col size="6">
          <div class="mini-card max">
            <ion-icon name="arrow-up-outline"></ion-icon>
            <p>Máxima</p>
            <h3>{{ stats.maximo }}°C</h3>
          </div>
        </ion-col>
        <ion-col size="6">
          <div class="mini-card min">
            <ion-icon name="arrow-down-outline"></ion-icon>
            <p>Mínima</p>
            <h3>{{ stats.minimo }}°C</h3>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
